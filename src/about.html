<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self' data:;" />
  <title>About — Stremio Discord Presence</title>
  <style>
    /*
     * Design thesis: this app is a *bridge* between two worlds — Stremio
     * (deep violet) and Discord (blurple). The signature element is the
     * "seam" where those two colors meet: a hairline gradient that runs
     * across the card and reappears as the connector between the two logos.
     * Everything else stays quiet so the seam is the one memorable thing.
     */
    :root {
      --stremio: #7b5bf5;   /* Stremio violet  */
      --discord: #5865f2;   /* Discord blurple */
      --bg-0:    #0d0e12;   /* window backdrop */
      --bg-1:    #16171d;   /* card surface    */
      --bg-2:    #1e2027;   /* pill / inset    */
      --line:    #282a33;   /* hairline border */
      --text:    #f3f4f7;
      --muted:   #9498a4;
      --green:   #3ba55c;
      --red:     #ed4245;
      --amber:   #faa61a;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-0: #eef0f4;
        --bg-1: #ffffff;
        --bg-2: #f1f2f6;
        --line: #e1e3ea;
        --text: #1b1d24;
        --muted: #6a6f7c;
      }
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: var(--bg-0);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 372px;
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 30px 28px 26px;
      overflow: hidden;
    }
    /* The seam: a hairline of the two brand colors across the card's top. */
    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, var(--stremio), var(--discord));
    }

    /* ---- Logo lockup: Stremio mark — connector — Discord glyph ---------- */
    .lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 20px;
    }
    .lockup .mark {
      width: 60px; height: 60px;
      border-radius: 15px;
      object-fit: cover;
      background: var(--bg-2);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }
    /* The connector line embodies the "bridge" — same gradient as the seam. */
    .connector {
      width: 46px; height: 2px;
      position: relative;
      background: linear-gradient(90deg, var(--stremio), var(--discord));
    }
    .connector::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      width: 7px; height: 7px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--text);
      box-shadow: 0 0 0 3px var(--bg-1);
    }
    .discord-glyph {
      width: 52px; height: 52px;
      display: grid; place-items: center;
      border-radius: 14px;
      background: var(--discord);
    }
    .discord-glyph svg { width: 30px; height: 30px; fill: #fff; }

    h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.2px;
      text-align: center;
      margin: 0 0 6px;
    }

    .version {
      display: block;
      width: fit-content;
      margin: 0 auto 18px;
      font-family: "Cascadia Code", "Consolas", ui-monospace, monospace;
      font-size: 11px;
      color: var(--muted);
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 10px;
    }

    /* ---- Live status: two pills reflecting the real running state ------- */
    .status {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .pill {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 11px;
    }
    .pill .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.2s ease;
    }
    .pill .dot.on  { background: var(--green); box-shadow: 0 0 0 3px rgba(59,165,92,0.18); }
    .pill .dot.off { background: var(--red); }
    .pill .dot.wait{ background: var(--amber); }
    .pill .meta { display: flex; flex-direction: column; line-height: 1.3; min-width: 0; }
    .pill .meta .k { font-size: 9.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 1px; }
    .pill .meta .v { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    p.desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.55;
      text-align: center;
      margin: 0 0 20px;
    }

    .links {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .links a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 9px 8px;
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .links a:hover { border-color: var(--discord); color: var(--discord); }
    .links a:focus-visible { outline: 2px solid var(--discord); outline-offset: 2px; }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }
    .credit { font-size: 11px; color: var(--muted); }
    button {
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 600;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(90deg, var(--stremio), var(--discord));
    }
    button:hover { filter: brightness(1.08); }
    button:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="lockup">
      <img class="mark" id="logo" alt="Stremio Discord Presence icon" />
      <div class="connector" aria-hidden="true"></div>
      <div class="discord-glyph" aria-hidden="true">
        <!-- Discord mark -->
        <svg viewBox="0 0 24 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.32 1.49A19.8 19.8 0 0 0 15.43 0c-.21.38-.46.9-.63 1.3a18.4 18.4 0 0 0-5.6 0C9.03.9 8.78.38 8.57 0A19.74 19.74 0 0 0 3.68 1.5C.57 6.12-.28 10.63.14 15.07a19.9 19.9 0 0 0 6.07 3.04c.49-.66.93-1.36 1.3-2.1-.71-.27-1.4-.6-2.04-.99.17-.12.34-.25.5-.38a14.2 14.2 0 0 0 12.06 0c.16.13.33.26.5.38-.65.39-1.33.72-2.05.99.38.74.81 1.44 1.3 2.1a19.84 19.84 0 0 0 6.08-3.04c.5-5.15-.85-9.62-3.58-13.58ZM8.02 12.33c-1.18 0-2.16-1.08-2.16-2.4 0-1.34.95-2.42 2.16-2.42 1.21 0 2.19 1.09 2.17 2.41 0 1.33-.96 2.41-2.17 2.41Zm7.96 0c-1.19 0-2.16-1.08-2.16-2.4 0-1.34.95-2.42 2.16-2.42 1.21 0 2.19 1.09 2.17 2.41 0 1.33-.95 2.41-2.17 2.41Z"/>
        </svg>
      </div>
    </div>

    <h1>Stremio Discord Presence</h1>
    <span class="version" id="version">v—</span>

    <div class="status" id="status">
      <div class="pill">
        <span class="dot" id="discordDot"></span>
        <span class="meta"><span class="k">Discord</span><span class="v" id="discordVal">—</span></span>
      </div>
      <div class="pill">
        <span class="dot" id="stremioDot"></span>
        <span class="meta"><span class="k">Stremio</span><span class="v" id="stremioVal">—</span></span>
      </div>
    </div>

    <p class="desc">
      Quietly mirrors what you’re watching on Stremio to your Discord profile —
      live from the system tray, with no account or login.
    </p>

    <div class="links">
      <a id="repoLink" tabindex="0">View on GitHub</a>
    </div>

    <div class="footer">
      <span class="credit" id="credit">© Kavisha Lakshan · MIT</span>
      <button id="closeBtn" type="button">Close</button>
    </div>
  </main>

  <script>
    // Uses the minimal `aboutAPI` bridge exposed by aboutPreload.js.
    // No direct Node / ipcRenderer / shell access in this renderer.

    function setPill(dotId, valId, state, text) {
      var dot = document.getElementById(dotId);
      var val = document.getElementById(valId);
      dot.classList.remove('on', 'off', 'wait');
      dot.classList.add(state);          // 'on' | 'off' | 'wait'
      val.textContent = text;
    }

    aboutAPI.getInfo().then(function (info) {
      if (!info) return;
      document.getElementById('version').textContent = 'v' + info.version;
      if (info.iconDataUrl) document.getElementById('logo').src = info.iconDataUrl;
      if (info.author) {
        document.getElementById('credit').textContent =
          '© ' + info.author + ' · ' + (info.license || 'MIT');
      }

      // Live status — honest content, not decoration.
      var d = (info.discordStatus || '').toLowerCase();
      if (d.indexOf('connected') !== -1) setPill('discordDot', 'discordVal', 'on', 'Connected');
      else if (d.indexOf('connecting') !== -1) setPill('discordDot', 'discordVal', 'wait', 'Connecting…');
      else setPill('discordDot', 'discordVal', 'off', info.discordStatus || 'Disconnected');

      if (info.stremioRunning) setPill('stremioDot', 'stremioVal', 'on', 'Running');
      else setPill('stremioDot', 'stremioVal', 'off', 'Not running');
    });

    document.getElementById('repoLink').addEventListener('click', function () { aboutAPI.openLink('github'); });
    document.getElementById('closeBtn').addEventListener('click', function () { aboutAPI.close(); });

    // Keyboard activation for the link "button".
    ['repoLink'].forEach(function (id) {
      document.getElementById(id).addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.click(); }
      });
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') aboutAPI.close();
    });
  </script>
</body>
</html>
